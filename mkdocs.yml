site_name: 我的文件網站
site_url: https://loyu0425.github.io/-/
repo_url: https://github.com/loyu0425/-
theme:
  name: material
  language: zh-TW
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 切換到深色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 切換到淺色模式
nav:
  - 首頁: index.md
  - 品牌介紹: about.md
  - 產品展示: products.md
  - 3D 檢視: viewer.md
plugins:
  - search
